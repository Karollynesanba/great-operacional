name: Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: operacional-great/package-lock.json

      - name: Install dependencies
        working-directory: operacional-great
        run: npm install --no-fund --no-audit

      - name: Build
        working-directory: operacional-great
        run: npm run build
